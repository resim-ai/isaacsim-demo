# Image refs come from the environment (matches CI: short git SHA suffix on each tag).
# From repo root: source scripts/ecr_compose_env.sh
# Then: docker compose -f builds/docker-compose.yml ...  OR  resim builds create ... --use-os-env
services:
  isaacsim:
    image: ${ISAACSIM_IMAGE}
    privileged: true
    labels:
      - resim.ai/containerPriority=1
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=all
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
                - nvidia
  nav2:
    image: ${NAV2_IMAGE}
    labels:
      - resim.ai/isTestOrchestrator=true
      - resim.ai/containerPriority=2
