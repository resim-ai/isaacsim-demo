# Used for running locally. Build the images first with `scripts/rebuild.sh`.
services:
  isaacsim:
    image: resim-isaacsim
    extends:
      file: docker-compose.yml
      service: isaacsim
    environment:
      - DISPLAY=${DISPLAY}
      - GUI=true
    volumes:
      - shadercache:/isaac-sim/shadercache
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../assets:/tmp/resim/assets
    network_mode: host
  nav2:
    image: resim-humble-nav2
    extends:
      file: docker-compose.yml
      service: nav2
    command: ["rviz:=true", "send_goals:=true"]
    environment:
      - DISPLAY=${DISPLAY}
      - RESIM_NAV2_TIMEOUT=3600
    volumes:
      - ../outputs:/tmp/resim/outputs
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    network_mode: host

volumes:
  shadercache: