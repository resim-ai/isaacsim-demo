version: 1

topics:
  goal_distance:
    schema:
      distance_m: float
      goal_name: string
  goal_status:
    schema:
      state: string
  goal_reached:
    event: true
    schema:
      name: string
      description: string
      status: status
      tags: string[]
  goal_count:
    schema:
      count: int
  time_to_goal:
    schema:
      time_s: float
      goal_name: string
  pose_difference:
    schema:
      position_diff_m: float
  localization_uncertainty:
    schema:
      position_uncertainty_m: float
      yaw_uncertainty_rad: float
      cov_x: float
      cov_y: float
      cov_yaw: float
      cov_xy: float
  covariance_accuracy:
    schema:
      position_error_m: float
      yaw_error_rad: float
      normalized_x: float
      normalized_y: float
      normalized_yaw: float
      mahalanobis_distance: float
      normalized_innovation_squared: float
      within_1_sigma: int
      within_2_sigma: int
      within_3_sigma: int
  camera_gif:
    schema:
      filename: image
  robot_trajectory:
    schema:
      raw_metric: string
  odom_linear_velocity:
    schema:
      x: float
      y: float
      z: float
  nearest_human_distance:
    schema:
      distance_m: float
      person_name: string

metrics:
  Stereo Camera Feed:
    type: test
    description: Camera feed from navigation, sped up 2x, starting after first goal received.
    query_string: SELECT filename FROM camera_gif
    template_type: system
    template: image
  Time to reach final goal:
    type: test
    description: Time between receiving first goal and reaching final goal; blocks if goal is not reached within 75 seconds.
    query_string: |
      WITH expected AS (
        SELECT COALESCE(MAX(count), 0) AS expected_goal_count
        FROM goal_count
      )
      SELECT
        CASE
          WHEN (SELECT expected_goal_count FROM expected) = 0 THEN 75
          WHEN (SELECT COUNT(*) FROM time_to_goal) != (SELECT expected_goal_count FROM expected) THEN 75
          ELSE SUM(time_s)
        END
      FROM time_to_goal;
    template_type: system
    template: scalar
    units: seconds
    status:
      query_string: |
        WITH expected AS (
          SELECT COALESCE(MAX(count), 0) AS expected_goal_count
          FROM goal_count
        )
        SELECT '1'
        FROM expected
        WHERE CASE
          WHEN expected_goal_count = 0 THEN 1
          WHEN (SELECT COUNT(*) FROM time_to_goal) != expected_goal_count THEN 1
          ELSE 0
        END = ?;
      block: 1
  Goal Status:
    type: test
    description: Status of the goals over time.
    query_string: SELECT 'Navigation' as "System", timestamp, state FROM goal_status
    template_type: system
    template: state_timeline
  Distance to Goal:
    type: test
    description: Distance to each goal over time, measured from odometry. Each line represents a different goal.
    query_string: SELECT goal_name as group_name, timestamp / 1E9 AS "Time (s)", distance_m as "Distance to Goal (m)" FROM goal_distance
    template_type: system
    template: line
  Nearest-Human Distance:
    type: test
    description: Distance from the robot to the nearest tracked human over time.
    query_string: |
      SELECT
        'Nearest Human' as group_name,
        timestamp / 1E9 AS "Time (s)",
        distance_m as "Distance to Nearest Human (m)"
      FROM nearest_human_distance;
    template_type: system
    template: line
    skip_if_no_data: true
    status:
      query_string: SELECT 1 FROM nearest_human_distance WHERE distance_m < ? LIMIT 1
      block: 0.5
      warn: 1.0
  Robot Trajectory:
    type: test
    description: Top-down view of the robot's trajectory throughout the run, with goal points marked as yellow arrows.
    query_string: SELECT raw_metric FROM robot_trajectory
    template_type: custom
    template_file: raw.liquid
  Localization Error:
    type: test
    description: Difference in position between odometry and AMCL localization poses over time.
    query_string: SELECT 'Error', timestamp / 1E9 AS "Time (s)", position_diff_m as "Position Difference (m)" FROM pose_difference
    template_type: system
    template: line
  AMCL Uncertainty Analysis:
    type: test
    description: Comparison of AMCL predicted uncertainty against actual localization errors over time.
    query_string: |
      SELECT 'Predicted Uncertainty (m)' as group_name, timestamp / 1E9 AS "Time (s)", position_uncertainty_m as "Distance (m)"
      FROM localization_uncertainty
      UNION ALL
      SELECT 'Actual Error (m)' as group_name, timestamp / 1E9 AS "Time (s)", position_error_m as "Distance (m)"
      FROM covariance_accuracy
      UNION ALL
      SELECT 'Mahalanobis Distance' as group_name, timestamp / 1E9 AS "Time (s)", mahalanobis_distance as "Distance (m)"
      FROM covariance_accuracy;
    template_type: system
    template: line
  AMCL Covariance Calibration:
    type: test
    description: Evaluates whether AMCL's uncertainty estimates are realistic. NIS measures if predicted covariance matches actual errors. Low NIS (<2.0) indicates overconfidence; high NIS (>2.0) indicates underconfidence.
    query_string: |
      SELECT "Metric", "Value" FROM (
        SELECT 1 as sort_order, 'Total Samples' as "Metric", CAST(COUNT(*) AS VARCHAR) as "Value"
        FROM covariance_accuracy
        UNION ALL
        SELECT 2 as sort_order, 'Within 1σ (target: ~68%)' as "Metric", CONCAT(CAST(ROUND(100.0 * AVG(CASE WHEN within_1_sigma = 1 THEN 1.0 ELSE 0.0 END), 1) AS VARCHAR), '%') as "Value"
        FROM covariance_accuracy
        UNION ALL
        SELECT 3 as sort_order, 'Within 2σ (target: ~95%)' as "Metric", CONCAT(CAST(ROUND(100.0 * AVG(CASE WHEN within_2_sigma = 1 THEN 1.0 ELSE 0.0 END), 1) AS VARCHAR), '%') as "Value"
        FROM covariance_accuracy
        UNION ALL
        SELECT 4 as sort_order, 'Within 3σ (target: ~99.7%)' as "Metric", CONCAT(CAST(ROUND(100.0 * AVG(CASE WHEN within_3_sigma = 1 THEN 1.0 ELSE 0.0 END), 1) AS VARCHAR), '%') as "Value"
        FROM covariance_accuracy
        UNION ALL
        SELECT 5 as sort_order, 'NIS Median (target: ~2.0)' as "Metric", CAST(ROUND(APPROX_PERCENTILE(normalized_innovation_squared, 0.5), 2) AS VARCHAR) as "Value"
        FROM covariance_accuracy
        ORDER BY sort_order
      );
    template_type: system
    template: table
  NIS Over Time:
    type: test
    description: Normalized Innovation Squared plotted over time. Shows how AMCL's covariance calibration varies during the run. Values near 2.0 indicate good calibration; consistently low values show overconfidence.
    query_string: |
      SELECT 
        'NIS (target: ~2.0)' AS group_name, 
        timestamp / 1E9 AS "Time (s)", 
        normalized_innovation_squared AS "NIS Value"
      FROM covariance_accuracy;
    template_type: system
    template: line
  Robot Speed:
    type: test
    description: Robot speed over time
    query_string: |
      SELECT 
        'Speed', 
        timestamp / 1E9 AS "Time (s)", 
        SQRT(POWER(x, 2) + POWER(y, 2)) AS "Speed (m/s)" 
      FROM odom_linear_velocity;
    template_type: system
    template: line
  # Batch metrics
  Total time to reach final Goal:
    type: batch
    description: Sum of all 'Time to reach final goal' metrics across all experiences.
    query_string: |
      WITH per_job AS (
        SELECT
          gc.job_id,
          MAX(gc.count) AS expected_goal_count,
          COUNT(ttg.time_s) AS completed_goal_count,
          COALESCE(SUM(ttg.time_s), 0) AS total_time
        FROM goal_count gc
        LEFT JOIN time_to_goal ttg ON gc.job_id = ttg.job_id
        GROUP BY gc.job_id
      )
      SELECT SUM(
        CASE
          WHEN completed_goal_count != expected_goal_count THEN 75
          ELSE total_time
        END
      )
      FROM per_job;
    template_type: system
    template: scalar
    units: seconds
  Time to complete (with vs without pedestrians):
    type: batch
    description: Mean time to reach the final goal, compared between scenarios with pedestrians and without (using custom field Pedestrians).
    query_string: |
      WITH per_job AS (
        SELECT
          gc.job_id,
          CASE
            WHEN COUNT(ttg.time_s) != MAX(gc.count) THEN 75
            ELSE COALESCE(SUM(ttg.time_s), 0)
          END AS total_time
        FROM goal_count gc
        LEFT JOIN time_to_goal ttg ON gc.job_id = ttg.job_id
        GROUP BY gc.job_id
      ),
      with_ped_field AS (
        SELECT
          pj.job_id,
          pj.total_time,
          m.custom_field_values[array_position(m.custom_field_keys, 'Pedestrians')] AS pedestrians
        FROM per_job pj
        JOIN metadata m ON pj.job_id = m.job_id
        WHERE contains(m.custom_field_keys, 'Pedestrians')
      )
      SELECT
        'Time to complete' AS group_name,
        CASE WHEN pedestrians = 'Yes' THEN 'With Pedestrians' ELSE 'Without Pedestrians' END AS "Scenario",
        ROUND(AVG(total_time), 1) AS "Mean Time (s)"
      FROM with_ped_field
      GROUP BY CASE WHEN pedestrians = 'Yes' THEN 'With Pedestrians' ELSE 'Without Pedestrians' END
      ORDER BY "Scenario";
    template_type: system
    template: bar
  Camera feed (bright scenes):
    type: batch
    description: All camera GIFs from scenarios with Lighting = Bright.
    query_string: |
      SELECT m.experience_name, cg.job_id
      FROM camera_gif cg
      JOIN metadata m ON cg.job_id = m.job_id
      WHERE contains(m.custom_field_keys, 'Lighting')
        AND m.custom_field_values[array_position(m.custom_field_keys, 'Lighting')] = 'Bright'
      ORDER BY m.experience_name;
    template_type: system
    template: image
  Camera feed (dim scenes):
    type: batch
    description: All camera GIFs from scenarios with Lighting = Dim.
    query_string: |
      SELECT m.experience_name, cg.job_id
      FROM camera_gif cg
      JOIN metadata m ON cg.job_id = m.job_id
      WHERE contains(m.custom_field_keys, 'Lighting')
        AND m.custom_field_values[array_position(m.custom_field_keys, 'Lighting')] = 'Dim'
      ORDER BY m.experience_name;
    template_type: system
    template: image
  Camera feed (dark scenes):
    type: batch
    description: All camera GIFs from scenarios with Lighting = Dark.
    query_string: |
      SELECT m.experience_name, cg.job_id
      FROM camera_gif cg
      JOIN metadata m ON cg.job_id = m.job_id
      WHERE contains(m.custom_field_keys, 'Lighting')
        AND m.custom_field_values[array_position(m.custom_field_keys, 'Lighting')] = 'Dark'
      ORDER BY m.experience_name;
    template_type: system
    template: image
  Goal Dwelling Time:
    type: test
    description: Time spent within 0.5m of each goal for each job
    query_string: |
      WITH dwelling_periods AS (
        SELECT
          goal_name AS group_name,
          m.experience_name,
          CASE
            WHEN LAG(timestamp) OVER (PARTITION BY m.experience_name, goal_name ORDER BY timestamp) IS NOT NULL
            THEN (timestamp - LAG(timestamp) OVER (PARTITION BY m.experience_name, goal_name ORDER BY timestamp)) / 1E9
            ELSE 0
          END AS time_diff
        FROM goal_distance gd
        JOIN metadata m ON gd.job_id = m.job_id
        WHERE distance_m <= 0.5
      )
      SELECT
        group_name,
        'Goal Number' AS y_title,
        'Dwelling Time (s)' AS x_title,
        CAST(ROUND(SUM(time_diff), 3) AS DOUBLE) AS x_values,
        experience_name AS customdata
      FROM dwelling_periods
      WHERE group_name IS NOT NULL
      GROUP BY group_name, experience_name
      ORDER BY CAST(regexp_extract(group_name, '([0-9]+)$', 1) AS INTEGER), experience_name;
    template_type: custom
    template_file: strip.liquid
  Pedestrian proximity incidents:
    type: batch
    description: For each named pedestrian, number of experiences (scenes) where they were hit (distance <0.5 m) or too close (0.5–1 m) to the robot; at most one count per experience.
    query_string: |
      WITH per_experience AS (
        SELECT job_id, person_name,
          count_if(distance_m < 0.5) > 0 AS was_hit,
          count_if(distance_m >= 0.5 AND distance_m < 1) > 0 AS was_too_close
        FROM nearest_human_distance
        GROUP BY job_id, person_name
      )
      SELECT 'Hit (<0.5 m)' AS group_name, person_name AS "Pedestrian", count_if(was_hit) AS "Count"
      FROM per_experience
      GROUP BY person_name
      UNION ALL
      SELECT 'Too close (0.5–1 m)' AS group_name, person_name AS "Pedestrian", count_if(was_too_close) AS "Count"
      FROM per_experience
      GROUP BY person_name
      ORDER BY group_name, "Pedestrian";
    template_type: system
    template: bar
    skip_if_no_data: true
  Aggregated Localization Error:
    type: test
    description: Position difference between odometry and AMCL localization across all experiences.
    query_string: |
      SELECT
        'Maximum' AS group_name,
        'Type' AS y_title,
        'Localization Error (m)' AS x_title,
        MAX(position_diff_m) AS x_values,
        m.experience_name AS customdata
      FROM pose_difference pd
      JOIN metadata m ON pd.job_id = m.job_id
      GROUP BY m.experience_name
      ORDER BY m.experience_name;
    template_type: custom
    template_file: strip.liquid
  AMCL Covariance Calibration Summary:
    type: batch
    description: Statistical assessment of covariance matrix calibration across all experiences.
    query_string: |
      SELECT "Metric", "Value" FROM (
        SELECT 1 as sort_order, 'Total Samples' as "Metric", CAST(COUNT(*) AS VARCHAR) as "Value"
        FROM covariance_accuracy
        UNION ALL
        SELECT 2 as sort_order, 'Within 1σ (target: ~68%)' as "Metric", CONCAT(CAST(ROUND(100.0 * AVG(CASE WHEN within_1_sigma = 1 THEN 1.0 ELSE 0.0 END), 1) AS VARCHAR), '%') as "Value"
        FROM covariance_accuracy
        UNION ALL
        SELECT 3 as sort_order, 'Within 2σ (target: ~95%)' as "Metric", CONCAT(CAST(ROUND(100.0 * AVG(CASE WHEN within_2_sigma = 1 THEN 1.0 ELSE 0.0 END), 1) AS VARCHAR), '%') as "Value"
        FROM covariance_accuracy
        UNION ALL
        SELECT 4 as sort_order, 'Within 3σ (target: ~99.7%)' as "Metric", CONCAT(CAST(ROUND(100.0 * AVG(CASE WHEN within_3_sigma = 1 THEN 1.0 ELSE 0.0 END), 1) AS VARCHAR), '%') as "Value"
        FROM covariance_accuracy
        UNION ALL
        SELECT 5 as sort_order, 'NIS Median (target: ~2.0)' as "Metric", CAST(ROUND(APPROX_PERCENTILE(normalized_innovation_squared, 0.5), 2) AS VARCHAR) as "Value"
        FROM covariance_accuracy
        ORDER BY sort_order
      );
    template_type: system
    template: table


metrics sets:
  Nav2 Metrics:
    metrics:
      # Job metrics
      - Stereo Camera Feed
      - Time to reach final goal
      - Goal Status
      - Distance to Goal
      - Nearest-Human Distance
      - Robot Trajectory
      - Robot Speed
      - Localization Error
      - AMCL Uncertainty Analysis
      - AMCL Covariance Calibration
      - NIS Over Time
      # Batch metrics
      - Goal Dwelling Time
      - Total time to reach final Goal
      - Time to complete (with vs without pedestrians)
      - Camera feed (bright scenes)
      - Camera feed (dim scenes)
      - Camera feed (dark scenes)
      - Pedestrian proximity incidents
      - Aggregated Localization Error
      - AMCL Covariance Calibration Summary